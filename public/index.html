<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca Online - ETEFMC</title>

    <style>
        :root {
            --bg: #f3f8fc;
            --surface: #ffffff;
            --surface-alt: #fafcff;
            --header: #ffffff;

            --text: #1e293b;
            --text-secondary: #64748b;
            --title: #1e3a8a;

            --border: #dbe7f3;
            --border-light: #edf2f7;

            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --primary-active: #1e40af;

            --thead: #eff6ff;
            --thead-border: #dbeafe;

            --shadow: 0 6px 20px rgba(15, 23, 42, .06);

            --scrollbar: #94a3b8;
            --scrollbar-hover: #64748b;

            --hover: #eef6ff;

            --status-ok-bg: #dafbe1;
            --status-ok-text: #1a7f37;

            --status-bad-bg: #ffebe9;
            --status-bad-text: #cf222e;
        }

        body.dark {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-alt: #273549;
            --header: #111827;

            --text: #e2e8f0;
            --text-secondary: #94a3b8;
            --title: #93c5fd;

            --border: #334155;
            --border-light: #334155;

            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --primary-active: #1d4ed8;

            --thead: #1e3a5f;
            --thead-border: #334155;

            --shadow: 0 8px 24px rgba(0, 0, 0, .35);

            --scrollbar: #475569;
            --scrollbar-hover: #64748b;

            --hover: #263449;

            --status-ok-bg: #14532d;
            --status-ok-text: #bbf7d0;

            --status-bad-bg: #7f1d1d;
            --status-bad-text: #fecaca;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        header {
            background: var(--header);
            border-bottom: 4px solid var(--primary);
            box-shadow: var(--shadow);
        }

        .header-content {
            width: 92%;
            max-width: 1300px;
            margin: auto;
            padding: 28px 0;
        }

        header h1 {
            font-size: 2rem;
            color: var(--text);
            font-weight: 700;
        }

        header p {
            margin-top: 6px;
            color: var(--text-secondary);
            font-size: .95rem;
        }

        .container {
            width: 92%;
            max-width: 1300px;
            margin: 35px auto;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 24px;
            margin-bottom: 24px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            border-radius: 14px;
            padding: 24px;
            transition:
                transform .2s,
                box-shadow .2s;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, .12);
        }

        h2 {
            font-size: 1.15rem;
            margin-bottom: 18px;
            color: var(--title);
            font-weight: 600;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        input,
        select {
            width: 100%;
            padding: 13px 15px;
            margin-bottom: 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--surface);
            color: var(--text);
            font-size: .95rem;
            transition: .2s;
        }

        input::placeholder {
            color: var(--text-secondary);
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, .15);
        }

        button {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 10px;
            background: var(--primary);
            color: white;
            font-size: .95rem;
            font-weight: 600;
            cursor: pointer;

            transition:
                background .2s,
                transform .15s,
                box-shadow .15s;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 12px rgba(0, 0, 0, .15);
        }

        button:active {
            background: var(--primary-active);
            transform: translateY(0);
            box-shadow: none;
        }

        .lista-livros {
            height: 520px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: 12px;
            transition: opacity .15s, transform .15s;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--surface);
        }

        thead th {
            position: sticky;
            top: 0;
            background: var(--thead);
            color: var(--title);
            font-weight: 600;
            padding: 14px;
            border-bottom: 2px solid var(--thead-border);
            z-index: 2;
        }

        tbody td {
            padding: 13px;
            border-bottom: 1px solid var(--border-light);
            text-align: center;
        }

        tbody tr:nth-child(even) {
            background: var(--surface-alt);
        }

        tbody tr:hover {
            background: var(--hover);
        }

        .lista-livros::-webkit-scrollbar {
            width: 8px;
        }

        .lista-livros::-webkit-scrollbar-thumb {
            background: var(--scrollbar);
            border-radius: 20px;
        }

        .lista-livros::-webkit-scrollbar-thumb:hover {
            background: var(--scrollbar-hover);
        }

        .lista-livros::-webkit-scrollbar-track {
            background: transparent;
        }

        .status {
            display: inline-block;
            min-width: 120px;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: .85rem;
            font-weight: 600;
            text-align: center;
        }

        .status-disponivel {
            background: var(--status-ok-bg);
            color: var(--status-ok-text);
        }

        .status-emprestado {
            background: var(--status-bad-bg);
            color: var(--status-bad-text);
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        #temaBtn {
            width: 45px;
            height: 45px;
            padding: 0;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition:
                background .2s,
                transform .3s;
        }

        #temaBtn:hover {
            background: var(--primary-hover);
            transform: rotate(20deg);
        }

        input[type="number"] {
            color-scheme: light;
        }

        body.dark input[type="number"] {
            color-scheme: dark;
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            filter: invert(0);
        }

        body.dark input[type="number"]::-webkit-inner-spin-button,
        body.dark input[type="number"]::-webkit-outer-spin-button {
            filter: invert(1);
        }

        #toast {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 9999;

            min-width: 280px;
            max-width: 400px;

            background: var(--surface);
            color: var(--text);

            border-left: 5px solid var(--primary);
            border-radius: 12px;

            padding: 16px 20px;

            box-shadow: var(--shadow);

            font-weight: 500;

            opacity: 0;
            transform: translateY(20px);

            pointer-events: none;

            transition: .3s;
        }

        #toast.mostrar {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
            cursor: pointer;
        }

        #toast.sucesso {
            border-left-color: #22c55e;
        }

        #toast.erro {
            border-left-color: #ef4444;
        }

        tbody {
            transition:
                opacity .15s,
                transform .15s;
        }

        .catalogo {
            margin-bottom: 24px;
        }

        @media (max-width: 700px) {

            .container,
            .header-content {
                width: 95%;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 1.6rem;
            }

        }
    </style>
</head>

<body>

    <header>

        <div class="header-content">

            <div class="header-top">

                <h1>Biblioteca Online</h1>

                <button id="temaBtn" onclick="alternarTema()">
                    🌙
                </button>

            </div>

            <p>Gerenciamento de empréstimos e catálogo da biblioteca ETEFMC</p>

        </div>

    </header>

    <div class="container">

        <div class="grid">

            <div class="card">

                <form id="loginForm">

                    <h2>Login</h2>

                    <input type="text" id="usuario" name="username" autocomplete="username" placeholder="Usuário">

                    <input type="password" id="senha" name="password" autocomplete="current-password"
                        placeholder="Senha">

                    <button type="submit">
                        Entrar
                    </button>

                </form>

            </div>

            <div class="card">

                <h2>Pesquisar Livros</h2>

                <select id="genero" onchange="listarLivros()">

                    <option value="">Todos os gêneros</option>
                    <option value="manga">Mangá</option>
                    <option value="ficcao">Ficção</option>
                    <option value="fantasia">Fantasia</option>
                    <option value="cientifico">Científico</option>
                    <option value="terror">Terror</option>

                </select>

                <input type="text" id="buscaNome" placeholder="Pesquisar pelo título..." oninput="pesquisarLivro()">

            </div>

        </div>

        <div class="card catalogo">

            <h2>Catálogo</h2>

            <div class="lista-livros">

                <table>

                    <thead>

                        <tr>

                            <th style="width:70px;">ID</th>

                            <th style="width:170px;">Leitor</th>

                            <th>Livro</th>

                            <th style="width:150px;">Gênero</th>

                            <th style="width:170px;">Status</th>

                        </tr>

                    </thead>

                    <tbody id="livros"></tbody>

                </table>

            </div>

        </div>

        <div class="grid">

            <div class="card">

                <h2>Registrar Empréstimo</h2>

                <input id="empID" type="number" placeholder="ID do livro">

                <input id="empAluno" placeholder="Nome do aluno">

                <button onclick="emprestar()">
                    Registrar Empréstimo
                </button>

            </div>

            <div class="card">

                <h2>Registrar Devolução</h2>

                <input id="devID" type="number" placeholder="ID do livro">

                <input id="devAluno" placeholder="Nome do aluno">

                <button onclick="devolver()">
                    Registrar Devolução
                </button>

            </div>

        </div>

        <div class="grid">

            <div class="card">

                <h2>Adicionar Livro</h2>

                <input id="novoNome" placeholder="Título do livro">

                <select id="novoGenero">

                    <option value="manga">Mangá</option>
                    <option value="ficcao">Ficção</option>
                    <option value="fantasia">Fantasia</option>
                    <option value="cientifico">Científico</option>
                    <option value="terror">Terror</option>

                </select>

                <button onclick="adicionarLivro()">
                    Adicionar ao Catálogo
                </button>

            </div>

            <div class="card">

                <h2>Excluir Livro</h2>

                <input id="excluirID" type="number" placeholder="ID do livro">

                <button onclick="excluirLivro()">
                    Excluir do Catálogo
                </button>

            </div>

        </div>

        <div id="toast"></div>

    </div>

    <script>
        const nomesGeneros = {
            manga: "Mangá",
            ficcao: "Ficção",
            fantasia: "Fantasia",
            cientifico: "Científico",
            terror: "Terror"
        };

        async function login() {

            const usuario = document.getElementById("usuario").value;
            const senha = document.getElementById("senha").value;

            const resposta = await fetch("/login", {

                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({
                    usuario,
                    senha
                })

            });

            const dados = await resposta.json();

            mostrarMensagem(dados.mensagem || dados.erro, resposta.status);

        }

        let tempoBusca;

        function pesquisarLivro() {

            clearTimeout(tempoBusca);

            tempoBusca = setTimeout(() => {
                listarLivros();
            }, 300);

        }

        async function listarLivros() {

            const genero = document.getElementById("genero").value;
            const nome = document.getElementById("buscaNome").value;

            let url = "/livros";

            const parametros = [];

            if (genero != "")
                parametros.push("genero=" + encodeURIComponent(genero));

            if (nome != "")
                parametros.push("nome=" + encodeURIComponent(nome));

            if (parametros.length > 0)
                url += "?" + parametros.join("&");

            const resposta = await fetch(url);

            const livros = await resposta.json();

            livros.sort((a, b) => {

                if (a.disponibilidade !== b.disponibilidade) {
                    return b.disponibilidade - a.disponibilidade;
                }

                return a.nome.localeCompare(b.nome);

            });

            let html = "";

            livros.forEach(l => {

                html += `
        <tr>
            <td>${l.id}</td>
            <td>${l.aluno}</td>
            <td>${l.nome}</td>
            <td>${nomesGeneros[l.genero]}</td>
            <td>
    ${l.disponibilidade
                        ? '<span class="status status-disponivel">Disponível</span>'
                        : '<span class="status status-emprestado">Emprestado</span>'
                    }
</td>
        </tr>
        `;

            });

            const tabela = document.querySelector(".lista-livros");

            tabela.style.opacity = "0";
            tabela.style.transform = "translateY(10px)";

            setTimeout(() => {
                document.getElementById("livros").innerHTML = html;

                tabela.style.opacity = "1";
                tabela.style.transform = "translateY(0)";
            }, 150);

        }

        async function emprestar() {

            const id = parseInt(document.getElementById("empID").value);

            const aluno = document.getElementById("empAluno").value;

            const resposta = await fetch("/emprestimo", {

                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({

                    id: id,

                    aluno: aluno

                })

            });

            const dados = await resposta.json();

            mostrarMensagem(dados.mensagem || dados.erro, resposta.status);

            listarLivros();
            document.getElementById("empID").value = "";
            document.getElementById("empAluno").value = "";
            document.getElementById("empID").focus();

        }

        async function devolver() {

            const id = parseInt(document.getElementById("devID").value);

            const aluno = document.getElementById("devAluno").value;

            const resposta = await fetch("/devolucao", {

                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({

                    id: id,

                    aluno: aluno

                })

            });

            const dados = await resposta.json();

            mostrarMensagem(dados.mensagem || dados.erro, resposta.status);

            listarLivros();
            document.getElementById("devID").value = "";
            document.getElementById("devAluno").value = "";
            document.getElementById("devID").focus();

        }

        async function adicionarLivro() {

            const nome = document.getElementById("novoNome").value;
            const genero = document.getElementById("novoGenero").value;

            const resposta = await fetch("/livros", {

                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({
                    nome,
                    genero
                })

            });

            const dados = await resposta.json();

            mostrarMensagem(dados.mensagem || dados.erro, resposta.status);

            listarLivros();
            document.getElementById("novoNome").value = "";
            document.getElementById("novoGenero").value = "manga";
            document.getElementById("novoNome").focus();

        }

        async function excluirLivro() {

            const id = parseInt(document.getElementById("excluirID").value);

            const resposta = await fetch("/livros/" + id, {
                method: "DELETE"
            });

            const dados = await resposta.json();

            mostrarMensagem(dados.mensagem || dados.erro, resposta.status);

            listarLivros();
            document.getElementById("excluirID").value = "";
            document.getElementById("excluirID").focus();
        }

        listarLivros();

        function enviarComEnter(id, funcao) {
            document.getElementById(id).addEventListener("keydown", e => {
                if (e.key === "Enter")
                    funcao();
            });
        }

        enviarComEnter("empID", emprestar);
        enviarComEnter("empAluno", emprestar);

        enviarComEnter("devID", devolver);
        enviarComEnter("devAluno", devolver);

        enviarComEnter("novoNome", adicionarLivro);
        enviarComEnter("novoGenero", adicionarLivro);

        enviarComEnter("excluirID", excluirLivro);

        enviarComEnter("buscaNome", listarLivros);

        document.getElementById("loginForm").addEventListener("submit", async e => {
            e.preventDefault();
            await login();
        });

        function alternarTema() {

            document.body.classList.toggle("dark");

            const escuro = document.body.classList.contains("dark");

            localStorage.setItem("tema", escuro ? "dark" : "light");

            document.getElementById("temaBtn").textContent =
                escuro ? "☀️" : "🌙";

        }

        if (localStorage.getItem("tema") === "dark") {

            document.body.classList.add("dark");

            document.getElementById("temaBtn").textContent =
                "☀️";

        }

        function mostrarMensagem(texto, status) {

            const toast = document.getElementById("toast");

            toast.innerText = texto;

            toast.className = "";

            if (status >= 200 && status < 300) {
                toast.classList.add("sucesso");
            }
            else if (status >= 400 && status < 500) {
                toast.classList.add("erro");
            }
            else {
                toast.classList.add("erro");
            }

            toast.classList.add("mostrar");

            clearTimeout(toast.timer);

            toast.timer = setTimeout(() => {
                toast.classList.remove("mostrar");
            }, 4000);

            toast.onclick = () => {
                toast.classList.remove("mostrar");
            };
        }

    </script>

</body>

</html>
